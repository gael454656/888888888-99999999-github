<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Espera 10 segundos...</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: white;
      overflow: hidden;
    }
    
    #pantalla-inicio {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      transition: opacity 1.2s ease;
      z-index: 10;
    }
    
    #pantalla-inicio.oculta {
      opacity: 0;
      pointer-events: none;
    }
    
    #pantalla-final {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    
    #pantalla-final.visible {
      opacity: 1;
    }
    
    .key {
      font-size: 4.5rem;
      font-weight: bold;
      letter-spacing: 8px;
      color: #00ff9d;
      text-shadow: 0 0 20px #00ff9d88;
      background: rgba(0,0,0,0.6);
      padding: 20px 60px;
      border-radius: 15px;
      border: 2px solid #00ff9d44;
    }
    
    .texto-pequeño {
      font-size: 1.4rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div id="pantalla-inicio">
    Espera 10 segundos...
  </div>

  <div id="pantalla-final">
    <div class="texto-pequeño">La clave es:</div>
    <div class="key">gaelA2335</div>
  </div>

  <script>
    // Esperamos 10 segundos
    setTimeout(() => {
      // Ocultamos la pantalla de espera
      document.getElementById('pantalla-inicio').classList.add('oculta');
      
      // Mostramos la pantalla final con la clave
      setTimeout(() => {
        document.getElementById('pantalla-final').classList.add('visible');
      }, 800); // pequeño retraso para que la transición quede bonita
      
    }, 10000); // 10000 ms = 10 segundos
  </script>

</body>
</html>
